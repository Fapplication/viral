<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications – Civil Eng. Portal</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script>
(async () => {
  const session = Session.requireStudent();
  if (!session) return;

  renderLayout({ role: 'student', activePage: 'notifications' });

  const pc = document.getElementById('pageContent');
  pc.innerHTML = `
    <div class="page-section">
      <div class="page-header">
        <h1>🔔 Notifications</h1>
        <p>Announcements and notices from your instructor.</p>
      </div>

      <!-- Filter Bar -->
      <div class="card mb-20">
        <div class="card-body" style="padding:12px 20px;">
          <div class="flex gap-12 items-center flex-wrap">
            <div class="input-wrap" style="flex:1;min-width:180px;">
              <span class="input-prefix">🔍</span>
              <input type="text" id="searchInput" class="form-control"
                     placeholder="Search notices..." oninput="filterNotices()" />
            </div>
            <div class="flex gap-8">
              <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
              <button class="filter-btn" data-filter="today" onclick="setFilter('today',this)">Today</button>
              <button class="filter-btn" data-filter="week" onclick="setFilter('week',this)">This Week</button>
            </div>
            <button class="btn btn-outline btn-sm" onclick="loadNotices()">🔄 Refresh</button>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="notif-stats mb-20" id="notifStats"></div>

      <!-- Notices List -->
      <div id="noticesContent">
        ${[1,2,3].map(()=>`
          <div class="card mb-12">
            <div class="card-body">
              <div class="skeleton skel-line" style="width:40%;margin-bottom:10px;"></div>
              <div class="skeleton skel-line"></div>
              <div class="skeleton skel-line" style="width:80%;"></div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Telegram CTA -->
      <div class="tg-notif-cta">
        <div class="tnc-icon">✈️</div>
        <div class="tnc-text">
          <div class="fw-700">Get instant notifications on Telegram</div>
          <div class="text-sm text-muted">Join @FBResultPortalBot to receive notices the moment they are posted.</div>
        </div>
        <a href="https://t.me/FBResultPortalBot" target="_blank"
           class="btn btn-sm" style="background:#0088cc;color:#fff;flex-shrink:0;">
          Join Bot
        </a>
      </div>
    </div>
  `;

  injectNotifStyles();

  let allNotices  = [];
  let activeFilter = 'all';

  await loadNotices();

  // ── Load Notices ─────────────────────────────────────────────
  window.loadNotices = async function() {
    const res = await API.getNotices();
    if (res.success && res.notices) {
      allNotices = [...res.notices].reverse(); // newest first
    }
    renderStats();
    filterNotices();
  };

  // ── Stats ────────────────────────────────────────────────────
  function renderStats() {
    const today = new Date().toDateString();
    const todayCount = allNotices.filter(n => {
      return new Date(n.Timestamp || n.timestamp || '').toDateString() === today;
    }).length;

    document.getElementById('notifStats').innerHTML = `
      <div class="ns2-item">
        <span class="ns2-val">${allNotices.length}</span>
        <span class="ns2-lbl">Total Notices</span>
      </div>
      <div class="ns2-item">
        <span class="ns2-val">${todayCount}</span>
        <span class="ns2-lbl">Today</span>
      </div>
      <div class="ns2-item">
        <span class="ns2-val">${allNotices.length > 0 ? DateUtil.format(allNotices[0].Timestamp || allNotices[0].timestamp) : '—'}</span>
        <span class="ns2-lbl">Latest</span>
      </div>
    `;
  }

  // ── Filter ───────────────────────────────────────────────────
  window.setFilter = function(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterNotices();
  };

  window.filterNotices = function() {
    const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
    const now    = new Date();

    let filtered = allNotices.filter(n => {
      const title = (n.Title || n.title || '').toLowerCase();
      const msg   = (n.Message || n.message || '').toLowerCase();
      return !search || title.includes(search) || msg.includes(search);
    });

    if (activeFilter === 'today') {
      filtered = filtered.filter(n => {
        const d = new Date(n.Timestamp || n.timestamp || '');
        return d.toDateString() === now.toDateString();
      });
    } else if (activeFilter === 'week') {
      const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
      filtered = filtered.filter(n => {
        const d = new Date(n.Timestamp || n.timestamp || '');
        return d >= weekAgo;
      });
    }

    renderNotices(filtered);
  };

  // ── Render ───────────────────────────────────────────────────
  function renderNotices(notices) {
    const nc = document.getElementById('noticesContent');
    if (!notices.length) {
      nc.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>No notices found</h3>
          <p>${activeFilter !== 'all' ? 'No notices for this time period.' : 'Your instructor has not posted any notices yet.'}</p>
        </div>`;
      return;
    }

    nc.innerHTML = notices.map((n, idx) => {
      const title     = n.Title     || n.title     || 'Notice';
      const message   = n.Message   || n.message   || '';
      const timestamp = n.Timestamp || n.timestamp || '';
      const sentBy    = n.SentBy    || n.sentBy    || 'Instructor';
      const isNew     = idx === 0;
      const isLong    = message.length > 200;

      return `
        <div class="notice-card ${isNew ? 'notice-new' : ''}">
          <div class="notice-card-header">
            <div class="nch-left">
              <div class="notice-icon-wrap">📣</div>
              <div>
                <div class="notice-title">${title}</div>
                <div class="notice-meta">
                  <span class="text-xs text-muted">👤 ${sentBy}</span>
                  <span class="text-xs text-muted">•</span>
                  <span class="text-xs text-muted">🕐 ${DateUtil.formatFull(timestamp)}</span>
                </div>
              </div>
            </div>
            <div class="nch-right">
              ${isNew ? '<span class="badge badge-blue">New</span>' : ''}
            </div>
          </div>
          <div class="notice-body">
            <p class="notice-msg" id="noticeMsg_${idx}">
              ${isLong ? message.substring(0, 200) + '...' : message}
            </p>
            ${isLong ? `
              <button class="link-btn text-xs mt-6" id="readMoreBtn_${idx}"
                      onclick="toggleReadMore(${idx}, \`${message.replace(/`/g,"'")}\`)">
                Read more ↓
              </button>` : ''}
          </div>
          <div class="notice-footer">
            <button class="btn btn-ghost btn-sm" onclick="copyNotice('${title.replace(/'/g,"\\'")}','${message.substring(0,100).replace(/'/g,"\\'")}')">
              📋 Copy
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Toggle Read More ─────────────────────────────────────────
  window.toggleReadMore = function(idx, fullMsg) {
    const msgEl = document.getElementById('noticeMsg_' + idx);
    const btn   = document.getElementById('readMoreBtn_' + idx);
    if (!msgEl || !btn) return;
    const isExpanded = btn.textContent.includes('less');
    msgEl.textContent = isExpanded ? fullMsg.substring(0, 200) + '...' : fullMsg;
    btn.textContent   = isExpanded ? 'Read more ↓' : 'Read less ↑';
  };

  // ── Copy Notice ──────────────────────────────────────────────
  window.copyNotice = function(title, msg) {
    copyToClipboard(`${title}\n\n${msg}`);
  };

})();

function injectNotifStyles() {
  if (document.getElementById('notif-styles')) return;
  const s = document.createElement('style');
  s.id = 'notif-styles';
  s.textContent = `
    /* Filter buttons */
    .filter-btn {
      padding: 6px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--trans);
    }
    .filter-btn:hover  { border-color: var(--primary-light); color: var(--primary-light); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* Stats */
    .notif-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ns2-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 16px;
    }
    .ns2-val { font-weight: 800; font-size: 1rem; color: var(--text); }
    .ns2-lbl { font-size: .72rem; color: var(--text-muted); }

    /* Notice Card */
    .notice-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: 12px;
      overflow: hidden;
      transition: var(--trans);
      box-shadow: var(--shadow-xs);
    }
    .notice-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .notice-card.notice-new {
      border-left: 4px solid var(--primary-light);
    }

    /* Notice Header */
    .notice-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 20px 12px;
      gap: 12px;
    }
    .nch-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex: 1;
    }
    .notice-icon-wrap {
      width: 38px; height: 38px;
      background: #dbeafe;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .notice-title {
      font-weight: 700;
      font-size: .95rem;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .notice-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .nch-right { flex-shrink: 0; }

    /* Notice Body */
    .notice-body {
      padding: 0 20px 12px 70px;
    }
    .notice-msg {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.7;
      margin: 0;
      white-space: pre-wrap;
    }

    /* Notice Footer */
    .notice-footer {
      padding: 8px 20px 10px 70px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 8px;
    }

    /* Telegram CTA */
    .tg-notif-cta {
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border: 1px solid #bae6fd;
      border-radius: var(--r-md);
      padding: 18px 22px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .tnc-icon { font-size: 2rem; flex-shrink: 0; }
    .tnc-text { flex: 1; min-width: 160px; }

    @media (max-width: 600px) {
      .notice-body   { padding-left: 20px; }
      .notice-footer { padding-left: 20px; }
      .tg-notif-cta  { flex-direction: column; text-align: center; }
    }
  `;
  document.head.appendChild(s);
}
</script>
</body>
</html>
